<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>四国大战 v5</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:"Microsoft YaHei",sans-serif;background:#0d1117;display:flex;flex-direction:column;align-items:center;min-height:100vh;padding:10px;color:#c9d1d9}
h1{font-size:22px;color:#ffd700;margin:8px 0;text-align:center}
.ctrl{display:flex;gap:10px;margin:8px 0}
.btn{padding:8px 20px;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:bold;color:#fff;background:#238636;transition:.2s}
.btn:hover{filter:brightness(1.15)}
.btn-r{background:#da3633}
#msg{font-size:14px;color:#8b949e;margin:6px 0;min-height:20px}
canvas{border:3px solid #30363d;border-radius:8px;background:#161b22}
.tips{font-size:12px;color:#6e7681;margin-top:8px;text-align:center}
</style>
</head>
<body>
<h1>⚔ 四国大战 v5 ⚔</h1>
<div class="ctrl">
  <button class="btn" onclick="startGame()">🎮 开局</button>
  <button class="btn btn-r" onclick="resetGame()">🔄 重置</button>
</div>
<div id="msg">点击「开局」开始</div>
<canvas id="board"></canvas>
<div class="tips">红蓝 vs 黄绿 · 司令>军长>师长>旅长>团长>营长>连长>排长>工兵 · 炸弹同归 · 工兵排雷 · 扛旗获胜</div>

<script>
// ===== 基本配置 =====
const U = 35;           // 格子间距
const W = 750, H = 750; // 画布大小
const CX = W/2, CY = H/2;

const canvas = document.getElementById('board');
canvas.width = W; canvas.height = H;
const ctx = canvas.getContext('2d');

// ===== 颜色配置 =====
const COLORS = ['#e53935','#4caf50','#2196f3','#ffeb3b']; // 红绿蓝黄
const DARKS  = ['#b71c1c','#2e7d32','#1565c0','#f9a825'];
const NAMES  = ['红','绿','蓝','黄'];
const EMOJI  = ['🔴','🟢','🔵','🟡'];
const TEAMS  = [0,1,0,1]; // 红-蓝联盟 vs 绿-黄联盟

// ===== 棋子 =====
// rank: 大=>强
// 10=司令,9=军长,8=师长,7=旅长,6=团长,5=营长,4=连长,3=排长,2=工兵
// 0=炸弹,1=地雷,11=军旗(特殊)
const PIECE_NAMES = ['炸','雷','工','排','连','营','团','旅','师','军','司','旗'];
const PIECE_CONFIG = [
  {rank:10, name:'司', count:1},
  {rank:9,  name:'军', count:1},
  {rank:8,  name:'师', count:2},
  {rank:7,  name:'旅', count:2},
  {rank:6,  name:'团', count:2},
  {rank:5,  name:'营', count:2},
  {rank:4,  name:'连', count:3},
  {rank:3,  name:'排', count:3},
  {rank:2,  name:'工', count:3},
  {rank:0,  name:'炸', count:2},
  {rank:1,  name:'雷', count:3},
  {rank:11, name:'旗', count:1},
]; // 每人25子

// ===== 棋盘布局 =====
// 每个玩家区域: 5行6列 (标准四国军棋布局)
// row 0-4, col 0-5
// 其中 col 0 和 col 5 是铁路线
// row 4 是大本营行 (军旗位)

const CAMPS = [[1,1],[1,3],[2,2],[3,1],[3,3]]; // 行营位置(row,col) - 在col 1-4范围内
const HQS   = [[4,1],[4,3]];                   // 大本营(军旗位)
const RAIL_COL = [0, 5];  // 铁路列
const RAIL_ROW = [0];     // 铁路行(只有row0是横向铁路)

// ===== 坐标计算 =====
// 四个玩家的位置:
// player 0 (红): 下方 (南)
// player 1 (绿): 右方 (东)
// player 2 (蓝): 上方 (北)
// player 3 (黄): 左方 (西)

// 每个玩家区域的基准点(左上角)
function getZoneOrigin(player) {
  // 标准四国军棋: 每个区域6列5行
  // 南: 基准点在左下, 向上延伸
  // 北: 基准点在右上, 向下延伸  
  // 东: 基准点在右下, 向左延伸
  // 西: 基准点在左上, 向右延伸
  const zoneW = 6 * U;  // 区域宽度(6列)
  const zoneH = 5 * U;  // 区域高度(5行)
  const gap = U * 0.5;  // 区域间隙
  
  switch(player) {
    case 0: // 南(下): 从下方开始，向上布局
      return { x: CX - zoneW/2, y: CY + gap, dir: 'up' };
    case 1: // 东(右): 从右方开始，向左布局
      return { x: CX + gap, y: CY + zoneH/2, dir: 'left' };
    case 2: // 北(上): 从上方开始，向下布局
      return { x: CX + zoneW/2, y: CY - gap, dir: 'down' };
    case 3: // 西(左): 从左方开始，向右布局
      return { x: CX - gap - zoneW, y: CY - zoneH/2, dir: 'right' };
  }
}

// 获取某个玩家某个格子的像素坐标
function getCellPos(player, row, col) {
  const origin = getZoneOrigin(player);
  let x, y;
  
  // 基础坐标(未旋转)
  const baseX = col * U;
  const baseY = row * U;
  
  switch(origin.dir) {
    case 'up':    // 南: x正向, y反向(row0在最远端/下方)
      x = origin.x + baseX;
      y = origin.y + zoneH - baseY;  // row0在最下
      break;
    case 'down':  // 北: x反向, y正向(row0在最远端/上方)
      x = origin.x + zoneW - baseX;
      y = origin.y + baseY;
      break;
    case 'left':  // 东: y正向变成x负向, x正向变成y正向
      x = origin.x - baseY;  // row变成x的负方向
      y = origin.y - zoneW/2 + baseX;  // col变成y
      break;
    case 'right': // 西: y正向变成x正向, x正向变成y负向
      x = origin.x + baseY;
      y = origin.y + zoneW/2 - baseX;
      break;
  }
  
  return { x, y };
}

const zoneW = 6 * U;
const zoneH = 5 * U;

// ===== 构建棋盘 =====
let cells = [];      // 所有格子
let cellMap = {};    // id -> cell
let adj = {};        // 邻接表
let pieces = {};     // id -> piece
let turn = 0;
let selected = null;
let gameOver = false;

// 格子ID: player * 100 + row * 10 + col
function makeId(player, row, col) {
  return player * 100 + row * 10 + col;
}

// 创建所有格子
function createBoard() {
  cells = [];
  cellMap = {};
  adj = {};
  
  for (let p = 0; p < 4; p++) {
    for (let r = 0; r < 5; r++) {
      for (let c = 0; c < 6; c++) {
        const id = makeId(p, r, c);
        const pos = getCellPos(p, r, c);
        
        // 判断格子类型
        let type = 'normal';
        if (CAMPS.some(([cr, cc]) => cr === r && cc === c)) type = 'camp';
        if (HQS.some(([hr, hc]) => hr === r && hc === c)) type = 'hq';
        
        const cell = { id, player: p, row: r, col: c, x: pos.x, y: pos.y, type };
        cells.push(cell);
        cellMap[id] = cell;
      }
    }
  }
  
  // 构建邻接关系
  buildAdjacency();
}

// 构建邻接表
function buildAdjacency() {
  adj = {};
  
  // 每个格子连接相邻格子
  for (const cell of cells) {
    const { player, row, col } = cell;
    const id = cell.id;
    
    if (!adj[id]) adj[id] = [];
    
    // 同区域内: 水平连接(col相邻)
    if (col < 5) {
      link(id, makeId(player, row, col + 1));
    }
    
    // 同区域内: 垂直连接(row相邻)
    if (row < 4) {
      link(id, makeId(player, row + 1, col));
    }
    
    // 行营对角连接
    if (cell.type === 'camp') {
      for (const [dr, dc] of [[-1,-1],[-1,1],[1,-1],[1,1]]) {
        const nr = row + dr, nc = col + dc;
        if (nr >= 0 && nr < 5 && nc >= 0 && nc < 6) {
          link(id, makeId(player, nr, nc));
        }
      }
    }
  }
  
  // 铁路连接(横向铁路 row=0)
  for (let p = 0; p < 4; p++) {
    for (let c = 0; c < 5; c++) {
      link(makeId(p, 0, c), makeId(p, 0, c + 1));
    }
  }
  
  // 铁路连接(纵向铁路 col=0 和 col=5)
  for (let p = 0; p < 4; p++) {
    for (let r = 0; r < 4; r++) {
      link(makeId(p, r, 0), makeId(p, r + 1, 0));
      link(makeId(p, r, 5), makeId(p, r + 1, 5));
    }
  }
  
  // 跨区域连接(四个角)
  // 南(0) col0 ↔ 西(3) col5 的 row0
  // 南(0) col5 ↔ 东(1) col0 的 row0
  // 北(2) col0 ↔ 东(1) col5 的 row0  
  // 北(2) col5 ↔ 西(3) col0 的 row0
  const cornerLinks = [
    [0, 0, 0, 3, 0, 5],  // 南左 ↔ 西右
    [0, 0, 5, 1, 0, 0],  // 南右 ↔ 东左
    [2, 0, 0, 1, 0, 5],  // 北左 ↔ 东右
    [2, 0, 5, 3, 0, 0],  // 北右 ↔ 西左
  ];
  
  for (const [p1, r1, c1, p2, r2, c2] of cornerLinks) {
    link(makeId(p1, r1, c1), makeId(p2, r2, c2));
  }
}

function link(a, b) {
  if (!adj[a]) adj[a] = [];
  if (!adj[b]) adj[b] = [];
  if (!adj[a].includes(b)) adj[a].push(b);
  if (!adj[b].includes(a)) adj[b].push(a);
}

// ===== 绘制 =====
function draw() {
  ctx.clearRect(0, 0, W, H);
  
  // 背景
  ctx.fillStyle = '#161b22';
  ctx.fillRect(0, 0, W, H);
  
  // 绘制格子
  drawCells();
  
  // 绘制连接线
  drawLines();
  
  // 绘制棋子
  drawPieces();
  
  // 绘制选中状态
  drawSelection();
}

function drawCells() {
  for (const cell of cells) {
    const { x, y, type, player } = cell;
    
    ctx.beginPath();
    
    if (type === 'camp') {
      // 行营: 菱形
      const s = U * 0.35;
      ctx.moveTo(x, y - s);
      ctx.lineTo(x + s, y);
      ctx.lineTo(x, y + s);
      ctx.lineTo(x - s, y);
      ctx.closePath();
      ctx.fillStyle = 'rgba(60,150,60,0.4)';
      ctx.fill();
      ctx.strokeStyle = '#4caf50';
      ctx.lineWidth = 2;
      ctx.stroke();
    } else if (type === 'hq') {
      // 大本营: 矩形
      const w = U * 0.7, h = U * 0.45;
      ctx.rect(x - w/2, y - h/2, w, h);
      ctx.fillStyle = 'rgba(255,200,0,0.35)';
      ctx.fill();
      ctx.strokeStyle = '#ffc107';
      ctx.lineWidth = 2;
      ctx.stroke();
    } else {
      // 普通格: 小圆点
      ctx.arc(x, y, 4, 0, Math.PI * 2);
      ctx.fillStyle = '#3d4450';
      ctx.fill();
    }
  }
}

function drawLines() {
  ctx.strokeStyle = '#30363d';
  ctx.lineWidth = 1;
  
  const drawn = new Set();
  
  for (const cell of cells) {
    for (const neighborId of (adj[cell.id] || [])) {
      const neighbor = cellMap[neighborId];
      if (!neighbor) continue;
      
      const key = Math.min(cell.id, neighborId) + '_' + Math.max(cell.id, neighborId);
      if (drawn.has(key)) continue;
      drawn.add(key);
      
      ctx.beginPath();
      ctx.moveTo(cell.x, cell.y);
      ctx.lineTo(neighbor.x, neighbor.y);
      ctx.stroke();
    }
  }
}

function drawPieces() {
  for (const cell of cells) {
    const piece = pieces[cell.id];
    if (!piece) continue;
    
    const { x, y } = cell;
    const color = COLORS[piece.player];
    const dark = DARKS[piece.player];
    
    // 棋子形状
    const w = U * 0.75, h = U * 0.5;
    
    // 阴影
    ctx.fillStyle = 'rgba(0,0,0,0.3)';
    ctx.beginPath();
    ctx.ellipse(x + 2, y + h * 0.25, w * 0.4, h * 0.12, 0, 0, Math.PI * 2);
    ctx.fill();
    
    // 棋子主体
    const grad = ctx.createLinearGradient(x - w/2, y - h/2, x + w/2, y + h/2);
    grad.addColorStop(0, color);
    grad.addColorStop(1, dark);
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.roundRect(x - w/2, y - h/2, w, h, 4);
    ctx.fill();
    
    ctx.strokeStyle = 'rgba(255,255,255,0.2)';
    ctx.lineWidth = 1;
    ctx.stroke();
    
    // 棋子文字
    ctx.fillStyle = '#fff';
    ctx.font = `bold ${U * 0.28}px Microsoft YaHei`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(PIECE_NAMES[piece.rank], x, y);
  }
}

function drawSelection() {
  if (!selected) return;
  
  const cell = cellMap[selected];
  if (!cell) return;
  
  // 选中光圈
  ctx.strokeStyle = '#ffd700';
  ctx.lineWidth = 3;
  ctx.shadowColor = '#ffd700';
  ctx.shadowBlur = 10;
  ctx.beginPath();
  ctx.arc(cell.x, cell.y, U * 0.45, 0, Math.PI * 2);
  ctx.stroke();
  ctx.shadowBlur = 0;
  
  // 可移动位置
  const reach = getReachable(selected);
  for (const tid of reach) {
    const tc = cellMap[tid];
    if (!tc) continue;
    
    const targetPiece = pieces[tid];
    if (targetPiece) {
      // 可攻击: 红色高亮
      ctx.fillStyle = 'rgba(255,80,80,0.25)';
    } else {
      // 可移动: 黄色高亮
      ctx.fillStyle = 'rgba(255,215,0,0.15)';
    }
    ctx.beginPath();
    ctx.arc(tc.x, tc.y, U * 0.3, 0, Math.PI * 2);
    ctx.fill();
  }
}

// ===== 移动逻辑 =====
function getReachable(fromId) {
  const piece = pieces[fromId];
  if (!piece) return [];
  
  const cell = cellMap[fromId];
  if (!cell) return [];
  
  const reach = [];
  const isWorker = piece.rank === 2; // 工兵
  
  // 遍历所有邻接格子
  for (const neighborId of (adj[fromId] || [])) {
    const neighbor = cellMap[neighborId];
    if (!neighbor) continue;
    
    const targetPiece = pieces[neighborId];
    
    // 不能移动到盟友的位置
    if (targetPiece && TEAMS[targetPiece.player] === TEAMS[piece.player]) {
      continue;
    }
    
    // 不能移动到敌方棋子的位置(除非攻击)
    if (targetPiece) {
      reach.push(neighborId);
      continue; // 有棋子就停，不能穿过
    }
    
    // 没有棋子，可以移动
    reach.push(neighborId);
    
    // 工兵在铁路上可以继续飞
    if (isWorker && isRailway(cell, neighbor)) {
      // BFS继续搜索铁路上的空格
      const visited = new Set([fromId, neighborId]);
      const queue = [neighborId];
      
      while (queue.length > 0) {
        const curId = queue.shift();
        const curCell = cellMap[curId];
        
        for (const nextId of (adj[curId] || [])) {
          if (visited.has(nextId)) continue;
          
          const nextCell = cellMap[nextId];
          if (!nextCell) continue;
          
          // 必须在铁路上
          if (!isRailway(curCell, nextCell)) continue;
          
          visited.add(nextId);
          
          const nextPiece = pieces[nextId];
          if (nextPiece) {
            // 有棋子：可以攻击但不能穿过
            if (TEAMS[nextPiece.player] !== TEAMS[piece.player]) {
              reach.push(nextId);
            }
            // 不管能不能攻击，都不能继续穿过
          } else {
            // 空格：可以移动并继续
            reach.push(nextId);
            queue.push(nextId);
          }
        }
      }
    }
  }
  
  return reach;
}

function isRailway(cell1, cell2) {
  // 两格都在铁路上才算铁路移动
  const onRail1 = RAIL_COL.includes(cell1.col) || RAIL_ROW.includes(cell1.row);
  const onRail2 = RAIL_COL.includes(cell2.col) || RAIL_ROW.includes(cell2.row);
  return onRail1 && onRail2 && cell1.player === cell2.player;
}

// ===== 吃子判定 =====
function resolveCombat(attacker, defender) {
  const r1 = attacker.rank;
  const r2 = defender.rank;
  
  // 炸弹：同归于尽
  if (r1 === 0 || r2 === 0) return 'draw';
  
  // 地雷：只有工兵能排
  if (r2 === 1) {
    return r1 === 2 ? 'win' : 'lose';
  }
  
  // 军旗：直接获胜
  if (r2 === 11) return 'flag';
  
  // 大吃小
  if (r1 > r2) return 'win';
  if (r1 < r2) return 'lose';
  
  // 同级：同归于尽
  return 'draw';
}

// ===== 胜负判定 =====
function checkGameOver() {
  // 检查军旗是否被扛
  for (const cellId of Object.keys(pieces)) {
    const piece = pieces[cellId];
    if (piece.rank === 11) {
      // 军旗还在，游戏继续
      return null;
    }
  }
  
  // 所有军旗都没了，看哪方还有棋子
  for (let team = 0; team < 2; team++) {
    const hasPiece = Object.values(pieces).some(p => TEAMS[p.player] === team);
    if (!hasPiece) {
      // 这个团队输了
      const winnerTeam = 1 - team;
      const winner = Object.values(pieces).find(p => TEAMS[p.player] === winnerTeam);
      return { winner: winner.player, reason: 'flag' };
    }
  }
  
  return null;
}

// ===== 游戏控制 =====
function startGame() {
  pieces = {};
  turn = 0;
  selected = null;
  gameOver = false;
  
  createBoard();
  
  // 初始化棋子(随机布阵)
  for (let p = 0; p < 4; p++) {
    let pool = [];
    for (const cfg of PIECE_CONFIG) {
      for (let i = 0; i < cfg.count; i++) {
        pool.push({ rank: cfg.rank, player: p });
      }
    }
    
    // 洗牌
    for (let i = pool.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [pool[i], pool[j]] = [pool[j], pool[i]];
    }
    
    // 按格子顺序放置
    const zoneCells = cells.filter(c => c.player === p);
    for (let i = 0; i < pool.length && i < zoneCells.length; i++) {
      pieces[zoneCells[i].id] = pool[i];
    }
  }
  
  draw();
  updateMsg(EMOJI[turn] + NAMES[turn] + '方行棋');
}

function resetGame() {
  pieces = {};
  selected = null;
  gameOver = false;
  createBoard();
  draw();
  updateMsg('点击「开局」开始');
}

function updateMsg(text) {
  document.getElementById('msg').textContent = text;
}

// ===== 点击交互 =====
canvas.addEventListener('click', (e) => {
  if (gameOver) return;
  if (Object.keys(pieces).length === 0) return;
  
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top) * (H / rect.height);
  
  // 找最近的格子
  let bestCell = null;
  let minDist = Infinity;
  
  for (const cell of cells) {
    const dist = Math.hypot(mx - cell.x, my - cell.y);
    if (dist < minDist && dist < U * 0.6) {
      minDist = dist;
      bestCell = cell;
    }
  }
  
  if (!bestCell) return;
  
  const clickedId = bestCell.id;
  const clickedPiece = pieces[clickedId];
  
  if (!selected) {
    // 选择棋子
    if (clickedPiece && clickedPiece.player === turn) {
      selected = clickedId;
      draw();
    }
  } else {
    // 已有选中
    
    if (clickedId === selected) {
      // 点击自己：取消选中
      selected = null;
      draw();
      return;
    }
    
    const reach = getReachable(selected);
    
    if (!reach.includes(clickedId)) {
      // 不可达：重新选择
      if (clickedPiece && clickedPiece.player === turn) {
        selected = clickedId;
        draw();
      } else {
        selected = null;
        draw();
      }
      return;
    }
    
    // 移动/攻击
    const attacker = pieces[selected];
    const defender = pieces[clickedId];
    
    if (!defender) {
      // 移动到空格
      pieces[clickedId] = attacker;
      delete pieces[selected];
    } else {
      // 攻击
      const result = resolveCombat(attacker, defender);
      
      if (result === 'win' || result === 'flag') {
        // 赢了：占领位置
        pieces[clickedId] = attacker;
        delete pieces[selected];
        
        if (result === 'flag') {
          gameOver = true;
          updateMsg(EMOJI[turn] + NAMES[turn] + '扛旗获胜！');
          draw();
          return;
        }
      } else if (result === 'lose') {
        // 输了：被吃
        delete pieces[selected];
      } else {
        // 同归于尽
        delete pieces[selected];
        delete pieces[clickedId];
      }
    }
    
    selected = null;
    
    // 检查胜负
    const victory = checkGameOver();
    if (victory) {
      gameOver = true;
      updateMsg(EMOJI[victory.winner] + NAMES[victory.winner] + '获胜！');
      draw();
      return;
    }
    
    // 换人
    for (let i = 0; i < 4; i++) {
      turn = (turn + 1) % 4;
      if (Object.values(pieces).some(p => p.player === turn)) {
        break;
      }
    }
    
    updateMsg(EMOJI[turn] + NAMES[turn] + '方行棋');
    draw();
  }
});

// ===== 启动 =====
createBoard();
draw();
</script>
